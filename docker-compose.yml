services:
  curso-node:
    image: papadopoli/curso-node:1.1.0
    container_name: curso-node
    ports:
      - "3000:3000"
      - "27017:27017"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app                    # <-- ALTERE AQUI
      - ./mongo-data:/data/db
      # - /app/node_modules        # remova ou mantenha comentado
    user: "10001:10001"